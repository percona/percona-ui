name: PR preview — Storybook deploy

on:
  workflow_run:
    workflows: ["PR preview — Storybook build"]
    types: [completed]
  pull_request_target:
    types: [closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [ -z "$pr_number" ]; then
            echo "No PR associated with workflow_run. Skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
      - name: Download Storybook artifact
        if: steps.pr.outputs.skip != 'true'
        uses: actions/download-artifact@v4.1.3
        with:
          name: storybook-static
          path: storybook-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Deploy PR preview
        if: steps.pr.outputs.skip != 'true'
        uses: rossjrw/pr-preview-action@v1
        with:
          action: deploy
          source-dir: ./storybook-static
          pr-number: ${{ steps.pr.outputs.number }}

  remove:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          action: remove
          pr-number: ${{ github.event.pull_request.number }}
